<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>初三4 班级名单</title>

<style>
body{
  font-family:"Microsoft YaHei",sans-serif;
  background:#eef1f5;
  padding:20px;
}

h1{
  text-align:center;
  margin-bottom:20px;
}

#search{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  margin-bottom:20px;
  font-size:14px;
}

.container{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:15px;
}

.card{
  background:white;
  padding:15px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  position:relative;
  transition:0.3s;
}

/* ⭐ 高亮效果 */
.card.highlight{
  border:3px solid #4a90e2;
  transform:scale(1.03);
  box-shadow:0 0 20px rgba(74,144,226,0.5);
}

.name{
  font-weight:bold;
  margin-bottom:5px;
}

.link-btn{
  position:absolute;
  top:8px;
  right:8px;
  font-size:10px;
  padding:3px 6px;
  background:#4a90e2;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.link-btn:hover{
  background:#357abd;
}
</style>
</head>

<body>

<h1>初三4 班级名单</h1>

<input id="search" placeholder="搜索 姓名 / 学号 / 职务">

<div class="container" id="container"></div>

<script>

const students = [
{no:1,name:"邱穆芸",id:"242154",job:"副文书"},
{no:2,name:"陈妍希",id:"242159",job:"副美术"},
{no:3,name:"张芷欣",id:"242156",job:"副国文"},
{no:4,name:"杨时瑜",id:"242149",job:"正图书"},
{no:5,name:"颜姿彤",id:"242163",job:"正科学"},
{no:6,name:"许亦萱",id:"242153",job:"副科学"},
{no:7,name:"陈嘉恩",id:"242168",job:"副辅导"},
{no:8,name:"陈钏宁",id:"242155",job:"正壁报"},
{no:9,name:"李静恩",id:"242158",job:"正数学"},
{no:10,name:"李开心",id:"240009",job:"无"},
{no:11,name:"刘瑞恩",id:"242160",job:"副壁报"},
{no:12,name:"黄禹嫣",id:"242164",job:"副财政"},
{no:13,name:"妮娅",id:"242166",job:"正财政"},
{no:14,name:"陈姿卉",id:"242162",job:"正辅导"},
{no:15,name:"何汶宣",id:"242165",job:"副地理"},
{no:16,name:"王歆茹",id:"242151",job:"无"},
{no:47,name:"杨仁喆",id:"242184",job:"无"}
];

const container = document.getElementById("container");

// ⭐ 获取 URL 参数
const urlParams = new URLSearchParams(window.location.search);
const selectedId = urlParams.get("id");

function render(list){
  container.innerHTML = "";

  list.forEach(s=>{
    const card = document.createElement("div");
    card.className = "card";
    card.dataset.id = s.id;

    card.innerHTML = `
      <button class="link-btn">取得链接</button>
      <div>序号：${s.no}</div>
      <div class="name">${s.name}</div>
      <div>学号：${s.id}</div>
      <div>职务：${s.job}</div>
    `;

    // 复制链接
    card.querySelector(".link-btn").onclick = ()=>{
      const link = `${window.location.origin}${window.location.pathname}?id=${s.id}`;
      navigator.clipboard.writeText(link);
      alert("已复制:\n" + link);
    };

    container.appendChild(card);
  });

  // ⭐ 自动定位 + 高亮
  if(selectedId){
    const target = document.querySelector(`[data-id="${selectedId}"]`);
    if(target){
      target.classList.add("highlight");
      target.scrollIntoView({behavior:"smooth", block:"center"});
    }
  }
}

render(students);

// 搜索
document.getElementById("search").addEventListener("input",e=>{
  const val = e.target.value.toLowerCase();
  const filtered = students.filter(s =>
    s.name.includes(val) ||
    s.id.includes(val) ||
    s.job.includes(val)
  );
  render(filtered);
});

</script>

</body>
</html>
