<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>初三4 班级名单</title>

<style>
body{
  font-family:"Microsoft YaHei",sans-serif;
  background:#eef1f5;
  padding:20px;
}

h1{
  text-align:center;
  margin-bottom:20px;
}

#search{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  margin-bottom:20px;
  font-size:14px;
}

.container{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:15px;
}

.card{
  background:white;
  padding:15px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  position:relative;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-3px);
}

/* ⭐ 高亮 */
.card.highlight{
  border:3px solid #4a90e2;
  transform:scale(1.03);
  box-shadow:0 0 20px rgba(74,144,226,0.5);
}

.name{
  font-weight:bold;
  margin-bottom:5px;
}

.link-btn{
  position:absolute;
  top:8px;
  right:8px;
  font-size:10px;
  padding:3px 6px;
  background:#4a90e2;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.link-btn:hover{
  background:#357abd;
}
</style>
</head>

<body>

<h1>初三4 班级名单</h1>

<input id="search" placeholder="搜索 姓名 / 学号 / 座号 / 职务 / 校庆">

<div class="container" id="container"></div>

<script>

// 🎉 校庆职位
function getEventRole(no){
  if(no == 31) return "主席";
  if(no == 13) return "副主席";
  if(no == 12) return "财政";
  if(no == 29) return "总务";
  if(no == 40) return "文宣";
  return "-";
}

// 数据

{no:46,name:"叶礼诚",id:"242172",job:"正媒体"},
{no:47,name:"杨仁喆",id:"242184",job:"无"}
];

const container = document.getElementById("container");

const urlParams = new URLSearchParams(window.location.search);
const selectedId = urlParams.get("id");

function render(list){
  container.innerHTML = "";

  list.forEach(s=>{
    const card = document.createElement("div");
    card.className = "card";
    card.dataset.id = s.id;

    card.innerHTML = `
      <button class="link-btn">取得链接</button>
      <div>座号：${s.no}</div>
      <div class="name">${s.name}</div>
      <div>学号：${s.id}</div>
      <div>职务：${s.job}</div>
      <div>校庆：${getEventRole(s.no)}</div>
    `;

    card.querySelector(".link-btn").onclick = ()=>{
      const link = `${window.location.origin}${window.location.pathname}?id=${s.id}`;
      navigator.clipboard.writeText(link);
      alert("已复制链接:\n" + link);
    };

    container.appendChild(card);
  });

  if(selectedId){
    const target = document.querySelector(`[data-id="${selectedId}"]`);
    if(target){
      target.classList.add("highlight");
      target.scrollIntoView({behavior:"smooth", block:"center"});
    }
  }
}

render(students);

// 搜索
document.getElementById("search").addEventListener("input",e=>{
  const val = e.target.value.toLowerCase();
  const filtered = students.filter(s =>
    s.name.includes(val) ||
    s.id.includes(val) ||
    String(s.no).includes(val) ||
    s.job.includes(val) ||
    getEventRole(s.no).includes(val)
  );
  render(filtered);
});

</script>

</body>
</html>
